# Run with `dart run ffigen --config ffigen.yaml`.
name: TPdfBindings
description: |
  Bindings for `src/t_pdf.h`.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: "lib/t_pdf_core_engine_bindings_generated.dart"
headers:
  entry-points:
    - "src/include/*.h"
  include-directives:
    - "src/include/*.h"

ffi-native:
comments:
  style: any
  length: full
